name: Update Projects

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate projects section
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const repos = await github.paginate(
              github.rest.repos.listForUser,
              {
                username: "Kaanreal",
                sort: "updated",
                direction: "desc",
                per_page: 100
              }
            );

            const projects = repos
              .filter(repo => !repo.fork)
              .filter(repo => repo.name.toLowerCase() !== "kaanreal")
              .slice(0, 6)
              .map(repo => {
                return `├── 🌸 ${repo.name}`;
              });

            const newSection = [
              "<!-- START_SECTION:projects -->",
              "```text",
              "📂 latest projects",
              "",
              ...projects,
              "```",
              "<!-- END_SECTION:projects -->"
            ].join("\n");

            const readmePath = "README.md";
            let readme = fs.readFileSync(readmePath, "utf8");

            const regex =
              /<!-- START_SECTION:projects -->[\s\S]*?<!-- END_SECTION:projects -->/;

            if (!regex.test(readme)) {
              console.log("Project section not found");
              process.exit(1);
            }

            readme = readme.replace(regex, newSection);

            fs.writeFileSync(readmePath, readme);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet || git commit -m "🌸 update projects section"

          git push
