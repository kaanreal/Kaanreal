name: Update Projects

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update projects section
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const repos = await github.paginate(
              github.rest.repos.listForUser,
              {
                username: "Kaanreal",
                sort: "updated",
                direction: "desc",
                per_page: 100
              }
            );

            const projects = repos
              .filter(repo => !repo.fork)
              .filter(repo => repo.name.toLowerCase() !== "kaanreal")
              .slice(0, 6)
              .map(repo => {
                return `├── 🌸 <a href="${repo.html_url}" style="text-decoration:none;color:#89CFF0;">${repo.name}</a>`;
              });

            const newSection = [
              "<!-- START_SECTION:projects -->",
              "<pre>",
              "📂 latest projects",
              "",
              ...projects,
              "</pre>",
              "<!-- END_SECTION:projects -->"
            ].join("\n");

            const readmePath = "README.md";
            let readme = fs.readFileSync(readmePath, "utf8");

            const regex =
              /<!-- START_SECTION:projects -->[\s\S]*?<!-- END_SECTION:projects -->/;

            if (regex.test(readme)) {
              readme = readme.replace(regex, newSection);
            } else {
              readme += "\n\n" + newSection;
            }

            fs.writeFileSync(readmePath, readme);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "🌸 update projects section"
          git push
